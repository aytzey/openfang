          <section class="sales-panel-section" x-show="activeTab === 'profiles' && isB2C && selectedProspectRecord()">
            <template x-if="selectedProspectRecord()">
              <div>
                <div class="sales-panel-header">
                  <h3 x-text="selectedEntityLabel + ' detaylari'"></h3>
                  <div class="sales-btn-row">
                    <span class="badge" :class="prospectResearchClass(selectedProspectRecord().research_status)" x-text="selectedProspectRecord().research_status"></span>
                    <span class="badge badge-muted" x-text="prospectConfidencePct(selectedProspectRecord())"></span>
                  </div>
                </div>
                <div class="sales-step-body">
                  <div class="text-sm" style="margin-bottom:10px" x-text="selectedProspectRecord().summary || '-'"></div>
                  <div class="sales-form-grid">
                    <div class="form-group">
                      <label>Birincil profil</label>
                      <div class="text-sm" x-text="prospectPrimaryContact(selectedProspectRecord())"></div>
                      <div class="text-xs text-dim" x-text="selectedProspectRecord().company_domain || '-'"></div>
                    </div>
                    <div class="form-group">
                      <label>Onerilen kanal</label>
                      <div class="text-sm" x-text="selectedProspectRecord().recommended_channel || '-'"></div>
                      <div class="text-xs text-dim" x-text="prospectChannels(selectedProspectRecord())"></div>
                    </div>
                    <div class="form-group">
                      <label>Siradaki hamle</label>
                      <div class="text-sm" x-text="prospectNextAction(selectedProspectRecord())"></div>
                    </div>
                    <div class="form-group">
                      <label>Fit skoru</label>
                      <div class="text-sm" x-text="selectedProspectRecord().fit_score"></div>
                    </div>
                    <div class="form-group">
                      <label>Buyer roles</label>
                      <div class="text-sm" x-text="(selectedProspectRecord().buyer_roles || []).join(' | ') || '-'"></div>
                    </div>
                    <div class="form-group">
                      <label>Outreach angle</label>
                      <div class="text-sm" x-text="selectedProspectRecord().outreach_angle || '-'"></div>
                    </div>
                    <div class="form-group">
                      <label>Signal sayisi</label>
                      <div class="text-sm" x-text="selectedProspectSignalCount"></div>
                    </div>
                    <div class="form-group">
                      <label>Kaynak sayisi</label>
                      <div class="text-sm" x-text="selectedProspectRecord().source_count || 0"></div>
                    </div>
                  </div>
                  <div class="sales-panel-section sales-panel-section--inner" x-show="(selectedProspectRecord().matched_signals || []).length > 0">
                    <div class="sales-panel-header">
                      <h3>Social + local market sinyalleri</h3>
                      <span class="badge badge-muted" x-text="selectedProspectSignalCount + ' signal'"></span>
                    </div>
                    <div class="sales-signal-list">
                      <template x-for="signal in (selectedProspectRecord().matched_signals || [])" :key="signal">
                        <div class="sales-signal-item">
                          <div class="text-sm" x-text="signal"></div>
                        </div>
                      </template>
                    </div>
                  </div>
                  <div class="sales-panel-section sales-panel-section--inner">
                    <div class="sales-panel-header">
                      <h3>Discovery linkleri</h3>
                      <span class="badge badge-muted" x-text="selectedProspectLinkCount + ' link'"></span>
                    </div>
                    <div class="sales-signal-list" x-show="prospectOsintLinks(selectedProspectRecord()).length > 0">
                      <template x-for="link in prospectOsintLinks(selectedProspectRecord())" :key="link">
                        <div class="sales-signal-item">
                          <a :href="link" target="_blank" rel="noreferrer" x-text="link"></a>
                        </div>
                      </template>
                    </div>
                    <div class="sales-empty" x-show="prospectOsintLinks(selectedProspectRecord()).length === 0">
                      <p>Kayitli link yok.</p>
                    </div>
                  </div>
                </div>
              </div>
            </template>
          </section>
