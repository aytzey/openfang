          <section class="sales-panel-section" x-show="activeTab === 'profiles' && selectedRunId">
            <div class="sales-panel-header">
              <h3 x-text="isB2C ? 'Secili run social profilleri' : 'Secili run prospect profilleri'"></h3>
              <button class="btn btn-ghost btn-sm" @click="loadRunProspects(selectedRunId)">Yenile</button>
            </div>
            <div class="table-wrap" x-show="runProspects.length > 0">
              <table>
                <thead><tr><th x-text="isB2C ? 'Profile' : 'Sirket'"></th><th>Durum</th><th x-text="isB2C ? 'Birincil profil' : 'Birincil temas'"></th><th>Kanal</th><th>Fit</th><th>ICP sinyali</th></tr></thead>
                <tbody>
                  <template x-for="p in runProspects" :key="p.id">
                    <tr>
                      <td><span class="font-bold" x-text="p.company"></span><div class="text-xs text-dim" x-text="p.company_domain"></div><button class="btn btn-ghost btn-sm" style="margin-top:8px" @click="selectProspect(p)">Profili ac</button></td>
                      <td><span class="badge" :class="prospectStatusClass(p.profile_status)" x-text="p.profile_status"></span></td>
                      <td class="text-xs"><div x-text="prospectPrimaryContact(p)"></div><div class="text-dim" x-text="p.contact_count + ' temas'"></div></td>
                      <td class="text-xs" x-text="prospectChannels(p)"></td>
                      <td x-text="p.fit_score"></td>
                      <td class="text-xs"><div class="sales-line-clamp" x-text="prospectSignalsPreview(p).join(' | ') || '-'"></div></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div class="sales-empty" x-show="runProspects.length === 0">
              <p x-text="isB2C ? 'Bu run icin goruntulenecek social profile yok.' : 'Bu run icin goruntulenecek prospect profile yok.'"></p>
            </div>
          </section>
