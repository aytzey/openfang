<body x-data="app" :data-theme="theme">
  <div class="sales-layout">
    <!-- Top bar -->
    <header class="sales-topbar">
      <div class="sales-topbar-left">
        <div class="sales-brand">
          <span class="sales-brand-icon">&#9670;</span>
          <span class="sales-brand-name">Pulsivo Salesman</span>
          <span class="sales-brand-sep">/</span>
          <span class="sales-brand-page" x-text="pageLabel"></span>
        </div>
      </div>
      <div class="sales-topbar-right">
        <div class="theme-toggle-group">
          <button class="theme-opt" :class="{ active: page === 'prospecting-b2b' }" @click="goToPage('prospecting-b2b')" title="B2B">B2B</button>
          <button class="theme-opt" :class="{ active: page === 'prospecting-b2c' }" @click="goToPage('prospecting-b2c')" title="B2C">B2C</button>
        </div>
        <div class="theme-toggle-group">
          <button class="theme-opt" :class="{ active: themeMode === 'light' }" @click="setTheme('light')" title="Light">&#9788;</button>
          <button class="theme-opt" :class="{ active: themeMode === 'system' }" @click="setTheme('system')" title="System">&#9675;</button>
          <button class="theme-opt" :class="{ active: themeMode === 'dark' }" @click="setTheme('dark')" title="Dark">&#9790;</button>
        </div>
        <span class="badge" :class="connected ? 'badge-success' : 'badge-error'" x-text="connected ? 'Online' : 'Offline'"></span>
        <span class="text-xs text-dim" x-show="!connected && lastError" x-text="lastError" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      </div>
    </header>

    <!-- Scrollable content -->
    <main class="sales-main" x-data="salesPage" x-init="init()">
      <!-- Loading state -->
      <div x-show="loading" class="sales-loading">
        <div class="spinner"></div>
        <span>Yukleniyor...</span>
      </div>

      <!-- Error state -->
      <div x-show="!loading && loadError" class="sales-error">
        <div class="sales-error-icon">!</div>
        <p x-text="loadError"></p>
        <button class="btn btn-ghost btn-sm" @click="refreshAll()">Yeniden dene</button>
      </div>

      <!-- Main content -->
      <div x-show="!loading && !loadError" class="sales-content">
