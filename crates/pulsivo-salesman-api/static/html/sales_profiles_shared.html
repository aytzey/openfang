          <section class="sales-panel-section" x-show="activeTab === 'profiles'">
            <div class="sales-panel-header">
              <h3 x-text="profilesTitle"></h3>
              <button class="btn btn-ghost btn-sm" @click="loadProspects()">Yenile</button>
            </div>
            <div class="table-wrap" x-show="prospects.length > 0">
              <table>
                <thead><tr><th x-text="isB2C ? 'Profile' : 'Sirket'"></th><th>Durum</th><th x-text="isB2C ? 'Birincil profil' : 'Birincil temas'"></th><th>Kanal</th><th>Fit</th><th>ICP sinyali</th><th>Aksiyon</th></tr></thead>
                <tbody>
                  <template x-for="p in prospects" :key="p.id">
                    <tr>
                        <td>
                          <span class="font-bold" x-text="p.company"></span>
                          <div class="text-xs text-dim" x-text="p.company_domain"></div>
                          <div class="text-xs text-dim sales-line-clamp" x-text="p.summary"></div>
                          <div class="text-xs text-dim" x-show="prospectTechStack(p)" x-text="'Tech: ' + prospectTechStack(p)"></div>
                          <button class="btn btn-ghost btn-sm" style="margin-top:8px" @click="selectProspect(p)">Profili ac</button>
                        </td>
                      <td><span class="badge" :class="prospectStatusClass(p.profile_status)" x-text="p.profile_status"></span></td>
                      <td class="text-xs">
                        <div x-text="prospectPrimaryContact(p)"></div>
                        <div class="text-dim" x-text="p.contact_count + ' temas'"></div>
                      </td>
                      <td class="text-xs" x-text="prospectChannels(p)"></td>
                      <td x-text="p.fit_score"></td>
                      <td class="text-xs"><div class="sales-line-clamp" x-text="prospectSignalsPreview(p).join(' | ') || '-'"></div></td>
                      <td><span class="badge" :class="prospectActionClass(p)" x-text="prospectActionSuggestion(p)" x-show="prospectActionSuggestion(p)"></span></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div class="sales-empty" x-show="prospects.length === 0">
              <p x-text="isB2C ? 'Henuz social profile yok. Yeni discovery run calistirin.' : 'Henuz aday musteri profili yok. Yeni run calistirin.'"></p>
            </div>
          </section>
